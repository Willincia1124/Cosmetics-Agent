<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmetics Agent</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="history-sidebar">
        <div class="history-header">
          <div class="brand-kicker">Cosmetics Agent</div>
          <h1>对话记录</h1>
          <p>当前会话中的最近消息会收纳在这里。</p>
        </div>

        <section class="history-panel">
          <div class="section-head">
            <h2>本次会话</h2>
            <button id="refresh-session" class="ghost small" type="button">刷新</button>
          </div>
          <div id="history-list" class="history-list"></div>
        </section>
      </aside>

      <main class="chat-layout">
        <header class="topbar">
          <div class="topbar-copy">
            <div class="topbar-kicker">Beauty Advisor</div>
            <h2>美妆导购助手</h2>
            <p>描述你的肤质、预算和偏好，我会给出推荐、提醒和替代方案。</p>
          </div>
          <button id="open-controls" class="ghost" type="button">控制面板</button>
        </header>

        <section id="chat-thread" class="chat-thread"></section>

        <form id="chat-form" class="composer">
          <textarea
            id="chat-input"
            placeholder="例如：我是混油痘肌，预算300，想找清爽不闷痘的防晒，最好避开香精。"
            rows="3"
          ></textarea>
          <div class="composer-actions">
            <div id="status-text" class="muted">准备就绪</div>
            <button id="send-btn" type="submit">发送</button>
          </div>
        </form>
      </main>
    </div>

    <div id="panel-backdrop" class="panel-backdrop" hidden></div>
    <aside id="control-drawer" class="control-drawer" aria-hidden="true">
      <div class="drawer-head">
        <div>
          <div class="brand-kicker">Control Panel</div>
          <h2>会话设置</h2>
        </div>
        <button id="close-controls" class="ghost small" type="button">关闭</button>
      </div>

      <section class="panel">
        <label>
          <span>Session ID</span>
          <input id="session-id" value="web-demo-session" />
        </label>
        <label>
          <span>User ID</span>
          <input id="user-id" value="web-demo-user" />
        </label>
        <label>
          <span>Top K</span>
          <input id="top-k" type="number" min="1" max="5" value="3" />
        </label>
        <button id="reset-session" class="ghost" type="button">重置当前会话</button>
      </section>

      <section class="panel" id="memory-panel">
        <div class="section-head">
          <h2>记忆概览</h2>
        </div>
        <div id="session-summary" class="muted">暂无会话摘要</div>
        <div id="long-term-memories" class="pill-list"></div>
      </section>
    </aside>

    <template id="message-template">
      <article class="message-card">
        <div class="message-role"></div>
        <div class="message-body"></div>
      </article>
    </template>

    <script src="/assets/app.js" defer></script>
  </body>
  </html>
