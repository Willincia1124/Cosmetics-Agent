<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmetics Agent</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div class="brand-mark">
          <span class="brand-icon">✦</span>
          <span class="brand-name">美妆智选</span>
        </div>
        <div class="header-actions">
          <button id="open-history" class="header-button" type="button">History</button>
          <button id="toggle-dev-mode" class="header-button console-button" type="button" aria-pressed="false">Console</button>
        </div>
      </header>

      <main class="hero-shell">
        <section class="hero-stage">
          <div class="hero-backdrop"></div>
          <div class="hero-overlay"></div>

          <div class="hero-copy" id="hero-copy">
            <p class="hero-kicker">YOUR PERSONAL BEAUTY CURATOR</p>
            <h1>找到最适合<span>你的</span>护肤品</h1>
            <p class="hero-description">告诉我你的肤质、预算、成分偏好和场景，我会帮你做更像真人导购的筛选与推荐。</p>

            <form id="chat-form" class="hero-search">
              <label class="search-field">
                <span class="sr-only">输入你的需求</span>
                <textarea
                  id="chat-input"
                  rows="1"
                  placeholder="我是油皮，预算1000，想买精华液"
                ></textarea>
              </label>
              <button id="send-btn" class="search-button" type="submit">
                <span class="search-icon">⌕</span>
                <span>搜索</span>
              </button>
            </form>

            <div class="hero-meta">
              <span>100+ 品牌</span>
              <span>智能匹配</span>
              <span>多平台比价</span>
            </div>
          </div>

          <section id="chat-thread" class="results-panel hidden"></section>
        </section>
      </main>
    </div>

    <div id="status-text" class="status-bar">准备就绪</div>

    <div id="panel-backdrop" class="panel-backdrop" hidden></div>

    <aside id="history-drawer" class="history-drawer" aria-hidden="true">
      <div class="drawer-head">
        <div>
          <div class="brand-kicker">Session History</div>
          <h2>对话记录</h2>
        </div>
        <button id="close-history" class="ghost small" type="button">关闭</button>
      </div>

      <section class="history-panel">
        <div class="section-head">
          <h3>本次会话</h3>
          <button id="refresh-session" class="ghost small" type="button">刷新</button>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>
    </aside>

    <aside id="control-drawer" class="control-drawer" aria-hidden="true">
      <div class="drawer-head">
        <div>
          <div class="brand-kicker">Console</div>
          <h2>开发者模式</h2>
        </div>
        <button id="close-controls" class="ghost small" type="button">关闭</button>
      </div>

      <section class="panel">
        <label>
          <span>Session ID</span>
          <input id="session-id" value="web-demo-session" />
        </label>
        <label>
          <span>User ID</span>
          <input id="user-id" value="web-demo-user" />
        </label>
        <label>
          <span>Top K</span>
          <input id="top-k" type="number" min="1" max="5" value="3" />
        </label>
        <button id="reset-session" class="ghost" type="button">重置当前会话</button>
      </section>

      <section class="panel" id="memory-panel">
        <div class="section-head">
          <h3>记忆概览</h3>
        </div>
        <div id="session-summary" class="muted">暂无会话摘要</div>
        <div id="long-term-memories" class="pill-list"></div>
      </section>
    </aside>

    <template id="message-template">
      <article class="message-card">
        <div class="message-role"></div>
        <div class="message-body"></div>
      </article>
    </template>

    <script src="/assets/app.js" defer></script>
  </body>
</html>
